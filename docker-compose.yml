version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: quizforge
      POSTGRES_USER: quizforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    expose:
      - "8000"
    volumes:
      - ./backend/pdfs:/app/pdfs
    environment:
      - DATABASE_URL=postgresql://quizforge:${POSTGRES_PASSWORD:-changeme}@db:5432/quizforge
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_ID_MONTHLY=${STRIPE_PRICE_ID_MONTHLY:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@quizforge.io}
      - DEBUG=false
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${FRONTEND_URL:-http://localhost}
      - NEXT_PUBLIC_APP_URL=${FRONTEND_URL:-http://localhost}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  nginx_certs:
